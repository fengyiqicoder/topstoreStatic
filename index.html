<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TopStore</title>
    <meta
      name="description"
      content="Paste your App Store link, get a complete copy-paste ready ASO package: keywords, title, subtitle, description, and screenshot copy."
    />
    <meta property="og:title" content="TopStore" />
    <meta
      property="og:description"
      content="Paste your App Store link, get a complete ASO package in 60 seconds"
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TopStore" />
    <meta
      name="twitter:description"
      content="Paste your App Store link, get a complete ASO package in 60 seconds"
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9A%80%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: "#f8f9fc",
              foreground: "#0f172a",
              primary: {
                DEFAULT: "#2563eb",
                dark: "#1d4ed8",
                light: "#60a5fa",
                bg: "#eff6ff",
              },
              accent: {
                DEFAULT: "#3b82f6",
                light: "#93c5fd",
              },
            },
            fontFamily: {
              sans: [
                "Inter",
                "system-ui",
                "-apple-system",
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "sans-serif",
              ],
              mono: ["ui-monospace", "SFMono-Regular", "monospace"],
            },
          },
        },
      };
    </script>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />

    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-MMM0ZNKCP6"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-MMM0ZNKCP6");
    </script>
  </head>
  <body class="min-h-full flex flex-col bg-background text-foreground">
    <main
      class="bg-gradient-to-b from-background to-white min-h-screen flex-1"
    >
      <!-- Navbar -->
      <nav class="w-full px-6 py-4 flex items-center justify-between">
        <span class="text-lg font-bold tracking-tight text-foreground"
          >TopStore</span
        >
        <button
          id="settings-btn"
          class="text-xs text-gray-400 hover:text-primary transition-colors cursor-pointer"
          title="Settings"
        >
          <span data-i18n="settings">Settings</span>
        </button>
      </nav>

      <!-- Hero / Input -->
      <section
        id="hero"
        class="w-full max-w-2xl mx-auto px-4 pt-16 pb-8 fade-in"
      >
        <h1
          class="text-3xl md:text-5xl font-bold text-center mb-3 leading-tight text-foreground"
          data-i18n="title"
        ></h1>
        <p
          class="text-center text-gray-500 mb-10 text-base md:text-lg"
          data-i18n="subtitle"
        ></p>

        <div
          class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6 md:p-8"
        >
          <input
            id="url-input"
            type="url"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary-bg outline-none text-base transition-all"
            data-i18n-attr="placeholder:urlPlaceholder"
          />
          <p
            id="url-hint"
            class="text-xs text-gray-400 mt-2 leading-relaxed"
            data-i18n="urlHint"
          ></p>
          <p
            id="url-error"
            class="text-sm text-red-500 mt-2 hidden"
            data-i18n="urlError"
          ></p>

          <button
            id="submit-btn"
            class="w-full mt-4 py-3 px-6 bg-primary hover:bg-primary-dark disabled:bg-gray-300 text-white font-medium rounded-xl transition-all text-base cursor-pointer disabled:cursor-not-allowed"
            disabled
          >
            <span id="submit-label" data-i18n="submit"></span>
          </button>
        </div>

        <p
          class="text-center text-sm text-gray-400 mt-4"
          data-i18n="socialProof"
        ></p>
      </section>

      <!-- Chain progress -->
      <section
        id="progress"
        class="w-full max-w-2xl mx-auto px-4 py-8 hidden"
      >
        <div class="mb-8">
          <div class="flex justify-between text-xs text-gray-400 mb-2">
            <span id="progress-count">0/2</span>
            <span id="progress-pct">0%</span>
          </div>
          <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
            <div
              id="progress-bar"
              class="h-full bg-primary rounded-full transition-all duration-500"
              style="width: 0%"
            ></div>
          </div>
        </div>
        <div id="steps" class="space-y-4"></div>
        <div id="progress-bottom"></div>
      </section>

      <!-- Results -->
      <section
        id="results"
        class="w-full max-w-3xl mx-auto px-4 py-8 hidden"
      >
        <div
          id="app-info-card"
          class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-6 text-center hidden"
        >
          <h2 id="app-info-title" class="text-xl font-bold text-foreground"></h2>
          <p id="app-info-meta" class="text-sm text-gray-500 mt-1"></p>
        </div>
        <div id="result-cards" class="space-y-6"></div>
        <div class="mt-8 space-y-4">
          <div
            id="share-card"
            class="bg-white rounded-2xl border border-gray-100 p-6 text-center"
          >
            <h3
              class="font-semibold text-gray-800 mb-3"
              data-i18n="shareTitle"
            ></h3>
            <div class="flex justify-center gap-3 flex-wrap">
              <button
                id="share-twitter"
                class="px-4 py-2 bg-black text-white text-sm rounded-lg hover:bg-gray-800 transition-colors cursor-pointer"
              >
                Twitter / X
              </button>
              <button
                id="share-linkedin"
                class="px-4 py-2 bg-blue-700 text-white text-sm rounded-lg hover:bg-blue-800 transition-colors cursor-pointer"
              >
                LinkedIn
              </button>
              <button
                id="share-copy"
                class="px-4 py-2 bg-gray-100 text-gray-700 text-sm rounded-lg hover:bg-gray-200 transition-colors cursor-pointer"
                data-i18n="copyLink"
              ></button>
            </div>
          </div>
          <div class="text-center">
            <button
              id="reset-btn"
              class="text-sm text-gray-400 hover:text-primary transition-colors cursor-pointer"
              data-i18n="startNew"
            ></button>
          </div>
        </div>
      </section>
    </main>

    <!-- Settings modal -->
    <div
      id="settings-modal"
      class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden items-center justify-center px-4"
    >
      <div
        class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6"
      >
        <h2
          class="text-lg font-bold mb-1"
          data-i18n="settingsTitle"
        ></h2>
        <p
          class="text-sm text-gray-500 mb-4"
          data-i18n="settingsHint"
        ></p>

        <label
          class="block text-xs font-medium text-gray-600 mb-1"
          data-i18n="apiKeyLabel"
        ></label>
        <input
          id="api-key-input"
          type="password"
          autocomplete="off"
          class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary-bg outline-none text-sm mb-3 font-mono"
          placeholder="sk-or-v1-..."
        />

        <label
          class="block text-xs font-medium text-gray-600 mb-1"
          data-i18n="modelLabel"
        ></label>
        <input
          id="model-input"
          type="text"
          class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary-bg outline-none text-sm mb-3 font-mono"
          placeholder="openai/gpt-oss-120b"
        />

        <label
          class="block text-xs font-medium text-gray-600 mb-1"
          data-i18n="proxyLabel"
        ></label>
        <input
          id="proxy-input"
          type="text"
          class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary-bg outline-none text-sm mb-3 font-mono"
          placeholder="https://corsproxy.io/?"
        />
        <p
          class="text-xs text-gray-400 leading-relaxed mb-4"
          data-i18n="proxyHint"
        ></p>

        <div class="flex justify-end gap-2">
          <button
            id="settings-cancel"
            class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 rounded-lg transition-colors cursor-pointer"
            data-i18n="cancel"
          ></button>
          <button
            id="settings-save"
            class="px-4 py-2 bg-primary hover:bg-primary-dark text-white text-sm font-medium rounded-lg transition-colors cursor-pointer"
            data-i18n="save"
          ></button>
        </div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
